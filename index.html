<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂貨系統 v5.1（修正版）</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{--p:#2563eb;--bg:#f8fafc;--card:#fff;--txt:#0f172a;--txtL:#64748b;--bdr:#e2e8f0;--ok:#10b981;--err:#ef4444;--w:#f59e0b}
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
    body{background:var(--bg);color:var(--txt);line-height:1.5;padding:1rem 1rem 100px}
    header{max-width:900px;margin:0 auto 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
    header h1{font-size:1.5rem}
    .status{font-size:.85rem;font-weight:500;padding:4px 10px;border-radius:6px;background:#f1f5f9}
    .status.ok{background:#dcfce7;color:#166534}.status.err{background:#fee2e2;color:#991b1b}.status.w{background:#fef3c7;color:#92400e}
    .actions{display:flex;gap:.5rem}
    .filter{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1rem}
    .fbtn{padding:.5rem 1rem;border:1px solid var(--bdr);background:var(--card);border-radius:20px;cursor:pointer;font-size:.9rem;white-space:nowrap;transition:.2s}
    .fbtn:hover{background:#f1f5f9}.fbtn.act{background:var(--p);color:#fff;border-color:var(--p)}
    .wrap{max-width:900px;margin:0 auto}
    .row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:.8rem 1rem;margin-bottom:.8rem;gap:1rem;transition:.2s}
    .row:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);transform:translateY(-1px)}
    .img{width:70px;height:70px;border-radius:10px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
    .info{flex:1;min-width:0}.info h3{font-size:1rem;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .price{color:var(--p);font-weight:600;font-size:.95rem}
    .cat{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.7rem;font-weight:500;margin-top:4px}
    .c1{background:#dbeafe;color:#1e40af}.c2{background:#dcfce7;color:#166534}.c3{background:#ffedd5;color:#9a3412}
    .ctrl{display:flex;align-items:center;gap:.5rem;background:var(--bg);padding:.4rem;border-radius:10px;flex-shrink:0}
    .qbtn{width:32px;height:32px;border:1px solid var(--bdr);background:#fff;border-radius:8px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
    .qbtn:hover:not(:disabled){background:#e2e8f0}.qbtn:disabled{opacity:.4;cursor:not-allowed}
    .qnum{min-width:24px;text-align:center;font-weight:700}
    .bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bdr);padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:90;flex-wrap:wrap;gap:.5rem}
    .bar-i{font-weight:600}.bar-a{display:flex;gap:.5rem}
    .btn{padding:.5rem 1rem;border:none;border-radius:8px;cursor:pointer;font-weight:500;font-size:.9rem;white-space:nowrap}
    .btn-p{background:var(--p);color:#fff}.btn-p:hover{background:#1d4ed8}
    .btn-o{background:transparent;border:1px solid var(--bdr);color:var(--txt)}.btn-o:hover{background:#f1f5f9}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:1rem;z-index:100}
    .modal.act{display:flex}.mc{background:var(--card);border-radius:14px;padding:1.5rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
    .mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .cls{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--txtL);line-height:1}
    .di{display:flex;justify-content:space-between;padding:.8rem 0;border-bottom:1px solid var(--bdr)}
    .tot{font-size:1.15rem;font-weight:700;text-align:right;margin:1rem 0;padding-top:.5rem;border-top:2px dashed var(--bdr)}
    .fg{margin-bottom:.9rem}.fg label{display:block;margin-bottom:.3rem;font-weight:500;font-size:.9rem}
    .fg input,.fg textarea{width:100%;padding:.6rem;border:1px solid var(--bdr);border-radius:8px;font-size:.95rem}
    .fg textarea{resize:vertical;min-height:70px}
    .suc{text-align:center;padding:1.5rem;color:var(--ok);display:none}.suc h2{margin-bottom:.4rem}
    @media(max-width:600px){.row{flex-wrap:wrap;padding:.7rem}.img{width:55px;height:55px}.ctrl{width:100%;justify-content:center;margin-top:.5rem}.bar{flex-direction:column;align-items:stretch}.bar-a{width:100%;justify-content:space-between}}
  </style>
</head>
<body>
  <header>
    <div><h1>📦 線上訂貨系統</h1><div class="status w" id="st">⏳ 載入中...</div></div>
    <div class="actions">
      <button class="btn btn-o" onclick="loadData()">🔄 同步</button>
      <button class="btn btn-o" onclick="expXLS()">📊 匯出</button>
    </div>
  </header>
  <div class="wrap">
    <div class="filter" id="flt">
      <button class="fbtn act" onclick="setF('all')">📦 全部</button>
      <button class="fbtn" onclick="setF('cat-1')">🍱 便當</button>
      <button class="fbtn" onclick="setF('cat-2')">🥤 OC飲料</button>
      <button class="fbtn" onclick="setF('cat-3')">🍞 麵包</button>
    </div>
    <div id="plist"></div>
  </div>
  <div class="bar">
    <div class="bar-i">已選 <span id="cc">0</span> 項 ｜ 合計 $<span id="ct">0</span></div>
    <div class="bar-a">
      <button class="btn btn-o" onclick="openM('det')">📋 明細</button>
      <button class="btn btn-p" onclick="openM('chk')">💳 結帳</button>
    </div>
  </div>
  <div class="modal" id="det"><div class="mc"><div class="mh"><h2>📋 訂單明細</h2><button class="cls" onclick="clM('det')">&times;</button></div><div id="dlist"></div><div class="tot">總計：$<span id="dt">0</span></div><button class="btn btn-p" style="width:100%" onclick="clM('det');openM('chk')">確認結帳</button></div></div>
  <div class="modal" id="chk"><div class="mc"><div class="mh"><h2>📝 訂購資料</h2><button class="cls" onclick="clM('chk')">&times;</button></div>
    <form id="cf"><div class="fg"><label>姓名 *</label><input type="text" id="nm" required></div><div class="fg"><label>電話 *</label><input type="tel" id="ph" required></div><div class="fg"><label>地址/取貨 *</label><input type="text" id="ad" required></div><div class="fg"><label>備註</label><textarea id="no"></textarea></div><div class="tot">應付：$<span id="chk-t">0</span></div><button type="submit" class="btn btn-p" style="width:100%">送出訂單</button></form>
    <div class="suc" id="suc"><h2>✅ 已送出！</h2><p>編號：<span id="oid"></span></p><p>將盡快與您聯繫。</p><button class="btn btn-o" style="margin-top:1rem" onclick="clM('chk');reset()">關閉</button></div>
  </div></div>

  <script>
    // 🔑 Google Sheet CSV 網址 (使用 gviz 繞過部分 CORS)
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1r9Q__zhD_BK3f7PL_tikeJBcNN95Dt8JYMnky9-jY8I/gviz/tq?tqx=out:csv&gid=0';
    const CAT = {'cat-1':{n:'便當',c:'c1',i:'🍱'},'cat-2':{n:'OC飲料',c:'c2',i:'🥤'},'cat-3':{n:'麵包',c:'c3',i:'🍞'}};
    let products=[], cart=JSON.parse(localStorage.getItem('cart')||'[]'), filter='all', loading=false;

    // ✅ RFC 4180 標準 CSV 解析器（解決 Google Sheet 雙引號/逗號包夾導致欄位錯位）
    function parseCSV(csv) {
      const rows = []; let row = [], cell = '', inQ = false;
      for (let i = 0; i < csv.length; i++) {
        const c = csv[i], n = csv[i+1];
        if (c === '"') { if (inQ && n === '"') { cell += '"'; i++; } else inQ = !inQ; }
        else if (c === ',' && !inQ) { row.push(cell.trim()); cell = ''; }
        else if ((c === '\r' || c === '\n') && !inQ) {
          row.push(cell.trim()); rows.push(row); row = []; cell = '';
          if (c === '\r' && n === '\n') i++;
        } else cell += c;
      }
      if (cell || row.length) { row.push(cell.trim()); rows.push(row); }
      return rows;
    }

    async function loadData() {
      if (loading) return; loading = true;
      const st = document.getElementById('st'); st.textContent = '⏳ 連線中...'; st.className = 'status w';
      try {
        const r = await fetch(SHEET_URL); if (!r.ok) throw new Error('HTTP ' + r.status);
        const t = await r.text(); if (!t.trim()) throw new Error('空白');
        const rows = parseCSV(t);
        // 自動跳過標題列
        if (rows[0] && /id|貨號|編號|名稱|name/i.test(rows[0].join(''))) rows.shift();
        if (rows.length < 2) throw new Error('資料不足');

        products = rows.filter(r => r[0]).map(r => ({
          id: r[0],
          name: r[1] || '未命名',
          price: parseInt((r[2]||'0').replace(/,/g,'')) || 0,
          cat: r[3] || 'cat-1'
        }));

        // 自動對應中文分類
        products.forEach(p => {
          if (/便當/.test(p.cat)) p.cat = 'cat-1';
          else if (/飲料|飲品|OC/.test(p.cat)) p.cat = 'cat-2';
          else if (/麵包|烘焙/.test(p.cat)) p.cat = 'cat-3';
          else if (!/^cat-[1-3]$/.test(p.cat)) p.cat = 'cat-1';
        });

        st.textContent = `🌐 線上成功：${products.length} 項`; st.className = 'status ok';
      } catch (e) {
        console.warn('Sheet 連線失敗:', e.message);
        st.textContent = '💻 離線模式：321 筆'; st.className = 'status err';
        products = OFFLINE.map(p => ({id:p.id, name:p.name, price:p.price||0, cat:p.cat}));
      } finally { loading = false; render(); }
    }

    function setF(c){filter=c;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('act',b.textContent.includes(c==='all'?'全部':c==='cat-1'?'便當':c==='cat-2'?'OC飲料':'麵包')));render()}
    function getQ(id){const i=cart.find(x=>x.id==id);return i?i.qty:0}
    function upQ(id,d){const i=cart.findIndex(x=>x.id==id);let n=i>=0?cart[i].qty+d:d;if(n<0)n=0;if(n===0)cart=cart.filter(x=>x.id!=id);else if(i>=0)cart[i].qty=n;else cart.push({id,qty:n});localStorage.setItem('cart',JSON.stringify(cart));render()}
    function getT(){return cart.reduce((s,i)=>{const p=products.find(x=>x.id==i.id);return s+(p?.price||0)*i.qty},0)}
    function render(){
      const list=document.getElementById('plist');const data=filter==='all'?products:products.filter(p=>p.cat===filter);
      list.innerHTML=data.length?data.map(p=>{const m=CAT[p.cat]||{n:'其他',c:'c1',i:'📦'},q=getQ(p.id);return `<div class="row"><div class="img">${m.i}</div><div class="info"><h3>${p.name}</h3><div class="price">$${(p.price||0).toLocaleString()}</div><span class="cat ${m.c}">${m.n}</span></div><div class="ctrl"><button class="qbtn" onclick="upQ('${p.id}',-1)" ${q===0?'disabled':''}>−</button><span class="qnum">${q}</span><button class="qbtn" onclick="upQ('${p.id}',1)">+</button></div></div>`}).join(''):'<p style="text-align:center;padding:2rem;color:var(--txtL)">無商品</p>';
      const c=cart.reduce((s,i)=>s+i.qty,0),t=getT();
      document.getElementById('cc').textContent=c;document.getElementById('ct').textContent=t.toLocaleString();
      document.getElementById('dt').textContent=t.toLocaleString();document.getElementById('chk-t').textContent=t.toLocaleString();
    }
